site_name: ModexAgent
site_description: A modular, composable, production-ready Python Agent framework.
site_url: https://moyu-er.github.io/modex-agent/
repo_url: https://github.com/moyu-er/ModexAgent
repo_name: moyu-er/ModexAgent
copyright: Copyright &copy; 2026 ModexAgent · MIT License

docs_dir: docs
# Local working docs (spec/tickets/handoff) — never built into the site
exclude_docs: |
  design/**
  handoff/**

theme:
  name: material
  custom_dir: overrides
  logo: assets/brand/logo-icon.svg
  favicon: assets/brand/logo-icon.svg
  font:
    text: IBM Plex Sans
    code: JetBrains Mono
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/weather-night
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.top
    - search.suggest
    - search.highlight
    # NOTE: navigation.instant intentionally NOT enabled — it breaks
    # third-party JS init (particle engine) on page transitions.

plugins:
  - search:
      lang: en
  - i18n:
      docs_structure: suffix
      languages:
        - locale: en
          name: English
          build: true
          default: true

nav:
  - Home: index.md
  - Installation: installation.md
  - Get Started: get-started.md
  - Concepts:
      - Graph Engine: concepts/graph-engine.md
      - Multi-Agent: concepts/multi-agent.md
      - Memory: concepts/memory.md

markdown_extensions:
  - admonition
    #  - tables   # builtin in mkdocs
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

extra_css:
  - stylesheets/extra.css
  - stylesheets/home.css
